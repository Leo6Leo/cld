name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "## Changes" > notes.md
          git log --format="- %h %s" "${PREV_TAG}..HEAD" --invert-grep --grep="chore: update formula" >> notes.md
          echo "" >> notes.md
          echo "**Full Changelog**: https://github.com/logonoff/cld/compare/${PREV_TAG}...${{ github.ref_name }}" >> notes.md

      - name: Create release
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes-file notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          URL="https://github.com/logonoff/cld/archive/refs/tags/${{ github.ref_name }}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          sed -i "s|url \".*\"|url \"${URL}\"|" Casks/cld.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/cld.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/cld.rb
          git commit -m "chore: update formula to ${{ github.ref_name }}"
          git push origin HEAD:main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
